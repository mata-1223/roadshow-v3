<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>스토리보드 — 초개인화 선제 대응 시나리오 (B~F)</title>
<style>
  :root{--pp:#7c3aed;--red:#dc2626;--amber:#d97706;--grn:#16a34a;--blu:#2563eb;}
  *{box-sizing:border-box;}
  body{margin:0;font-family:-apple-system,"Apple SD Gothic Neo",system-ui,sans-serif;color:#0f172a;background:linear-gradient(180deg,#f8fafc,#eef2f7);padding:20px;display:flex;flex-direction:column;align-items:center;}
  h1{font-size:1.18rem;margin:0 0 3px;} .sub{color:#64748b;margin:0 0 10px;font-size:.84rem;} .sub b{color:var(--pp);}
  .tabs{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;}
  .tabs button{font-size:.78rem;font-weight:800;color:#475569;background:#fff;border:1px solid #e2e8f0;border-radius:9px;padding:.45rem .7rem;cursor:pointer;transition:all .2s;}
  .tabs button.on{color:#fff;background:var(--pp);border-color:var(--pp);box-shadow:0 3px 10px rgba(124,58,237,.35);}
  .tabs .dom{font-size:.6rem;opacity:.7;}
  /* 임베드(데모 오버레이) 모드: 내부 탭·안내문 숨김 → 시나리오 전환은 오버레이가 제어 */
  .embed .tabs, .embed .note { display:none; }
  .stage{position:relative;width:960px;max-width:98vw;height:600px;background:#0b1020;border-radius:16px;overflow:hidden;box-shadow:0 14px 40px rgba(15,23,42,.25);display:flex;flex-direction:column;}

  .badge{height:34px;flex:none;display:flex;align-items:center;justify-content:center;gap:8px;background:linear-gradient(#1e1b3a,#241d44);color:#fff;font-weight:800;font-size:.84rem;}
  .badge .dot{width:7px;height:7px;border-radius:50%;background:#4ade80;animation:gpulse 1.4s ease-in-out infinite;}

  .tl{flex:none;height:58px;display:flex;align-items:center;padding:0 16px;background:#11162a;border-bottom:1px solid #20283f;position:relative;}
  .tl .clock{position:absolute;right:14px;top:5px;font-size:.68rem;font-weight:800;color:#a5b4fc;}
  .tl .node{flex:1;display:flex;flex-direction:column;align-items:center;position:relative;color:#64748b;font-size:.62rem;font-weight:700;text-align:center;}
  .tl .node::before{content:'';position:absolute;top:13px;left:50%;width:100%;height:2px;background:#283149;z-index:0;}
  .tl .node:last-child::before{display:none;}
  .tl .node .pt{width:13px;height:13px;border-radius:50%;background:#283149;border:2px solid #475569;z-index:1;margin-bottom:5px;transition:all .3s;}
  .tl .node.on{color:#e9d5ff;} .tl .node.on .pt{background:var(--pp);border-color:#c4b5fd;box-shadow:0 0 0 4px rgba(124,58,237,.3);}
  .tl .node.done .pt{background:var(--grn);border-color:#86efac;}

  .main{flex:1;display:grid;grid-template-columns:1fr 1fr;min-height:0;}
  .col{position:relative;padding:10px 12px;overflow:hidden;display:flex;flex-direction:column;}
  .engine{background:linear-gradient(160deg,#0f1830,#0a1020);border-right:1px solid #20283f;}
  .cust{background:linear-gradient(160deg,#241b14,#1a130d);}
  .coltag{font-size:.66rem;font-weight:800;padding:.2rem .5rem;border-radius:999px;align-self:flex-start;}
  .engine .coltag{background:rgba(124,58,237,.2);color:#c4b5fd;} .cust .coltag{background:rgba(251,191,36,.18);color:#fcd34d;}

  /* 관측 레이더 */
  .radar{position:relative;height:96px;margin:8px 0;border-radius:10px;background:#0c1426;border:1px solid #1e293b;display:flex;align-items:center;justify-content:center;overflow:hidden;}
  .radar .ico{font-size:34px;z-index:2;}
  .radar .ring{position:absolute;width:40px;height:40px;border-radius:50%;border:2px solid rgba(124,58,237,.5);}
  .radar .rcount{position:absolute;top:6px;right:8px;font-size:.56rem;font-weight:800;color:#fca5a5;background:rgba(0,0,0,.4);padding:.12rem .45rem;border-radius:999px;z-index:3;}
  .radar.scan .ring{animation:radar 2s ease-out infinite;}
  .radar .ring:nth-child(2){animation-delay:.6s;} .radar .ring:nth-child(3){animation-delay:1.2s;}
  @keyframes radar{0%{transform:scale(.5);opacity:.9}100%{transform:scale(3.4);opacity:0}}

  .profile{font-size:.62rem;font-weight:800;color:#fcd34d;background:rgba(251,191,36,.12);border:1px solid rgba(251,191,36,.3);border-radius:8px;padding:.22rem .5rem;margin:8px 0 6px;}
  .sigs{display:flex;flex-direction:column;gap:4px;margin-bottom:6px;}
  .sig{display:flex;align-items:center;gap:6px;font-size:.68rem;font-weight:700;color:#cbd5e1;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:.22rem .5rem;opacity:0;transform:translateX(-8px);}
  .sig.show{animation:sigin .4s ease forwards;} @keyframes sigin{to{opacity:1;transform:none;}}
  .sig .v{margin-left:auto;color:#fca5a5;font-weight:800;}

  .gauge-wrap{margin-top:auto;}
  .gauge-lab{display:flex;justify-content:space-between;font-size:.64rem;font-weight:800;color:#94a3b8;margin-bottom:4px;gap:6px;}
  .gauge{position:relative;height:14px;border-radius:8px;background:#1e293b;overflow:hidden;}
  .gauge .fill{height:100%;width:0;background:linear-gradient(90deg,#7c3aed,#a78bfa);}
  .gauge.risk .fill{background:linear-gradient(90deg,#dc2626,#f59e0b);}
  .gauge .thr{position:absolute;top:-3px;bottom:-3px;left:70%;width:2px;background:#fbbf24;}
  .gauge .thr::after{content:'임계';position:absolute;top:-13px;left:-9px;font-size:.5rem;color:#fbbf24;font-weight:800;white-space:nowrap;}
  .intent-fixed{margin-top:8px;text-align:center;font-size:.76rem;font-weight:800;color:#fff;background:linear-gradient(90deg,var(--pp),#9333ea);border-radius:9px;padding:.4rem;opacity:0;transform:scale(.9);}
  .intent-fixed.risk{background:linear-gradient(90deg,#b91c1c,#ea580c);}
  .intent-fixed.show{animation:pop .4s cubic-bezier(.2,.8,.3,1.2) forwards;} @keyframes pop{to{opacity:1;transform:none;}}

  /* 고객 트랙 */
  .home{position:relative;flex:1;min-height:0;margin:8px 0;border-radius:10px;overflow:hidden;}
  .c-floor{position:absolute;bottom:0;left:0;right:0;height:22px;background:rgba(120,86,52,.4);}
  .prop{position:absolute;top:12px;left:14px;font-size:24px;opacity:.9;}
  .loc-tag{position:absolute;top:14px;left:52px;z-index:6;font-size:.58rem;font-weight:800;color:#fcd34d;background:rgba(0,0,0,.35);padding:.16rem .5rem;border-radius:999px;}
  .people{position:absolute;left:6px;right:124px;bottom:14px;display:flex;align-items:flex-end;justify-content:center;gap:8px;z-index:3;}
  .people .pp{flex:none;} .people .pp.child{transform:scale(.7);transform-origin:bottom;}
  /* C 전용: 자녀(외부) / 보호자(자택) 분리 공간 */
  .zbg-left,.split-div,.splitzone{display:none;}
  .home.split .zbg-left,.home.split .split-div,.home.split .splitzone{display:block;}
  .home.split .people{display:none;} .home.split .loc-tag,.home.split .prop{display:none;}
  .zbg-left{position:absolute;left:2%;top:34px;bottom:0;width:37%;border-radius:10px;background:linear-gradient(160deg,#16243f,#0e1830);z-index:0;}
  .zbg-left::before{content:'🏙️';position:absolute;top:6px;left:8px;font-size:15px;opacity:.55;}
  .split-div{position:absolute;left:41%;top:40px;bottom:6px;border-left:2px dashed rgba(255,255,255,.16);z-index:1;}
  .zone{position:absolute;bottom:14px;display:flex;flex-direction:column;align-items:center;z-index:3;}
  .zone .zlabel{margin-bottom:4px;font-size:.55rem;font-weight:800;padding:.14rem .45rem;border-radius:999px;white-space:nowrap;}
  .zleft{left:14%;transform:translateX(-50%);} .zleft .zlabel{background:rgba(56,189,248,.2);color:#7dd3fc;}
  .zright{left:56%;transform:translateX(-50%);} .zright .zlabel{background:rgba(251,191,36,.2);color:#fcd34d;}
  .home.split .ai-bubble{left:auto;right:118px;} .home.split .qmark{left:56%;}
  .qmark{position:absolute;left:40%;transform:translateX(-50%);bottom:104px;font-size:20px;color:#fca5a5;opacity:0;z-index:4;}
  .qmark.show{animation:fade .4s ease forwards;} .home.resolved .qmark{opacity:0 !important;}
  .face-q{opacity:1;} .face-relief{opacity:0;} .home.resolved .face-q{opacity:0;} .home.resolved .face-relief{opacity:1;}

  .phone{position:absolute;right:18px;bottom:14px;width:104px;height:160px;background:#0f172a;border-radius:14px;border:3px solid #1e293b;padding:5px;z-index:5;box-shadow:0 6px 16px rgba(0,0,0,.5);}
  .pscreen{width:100%;height:100%;border-radius:10px;background:linear-gradient(165deg,#243047,#0f172a);display:flex;flex-direction:column;align-items:center;overflow:hidden;}
  .ptime{font-size:1.1rem;font-weight:800;color:#fff;margin:6px 0 0;} .pdate{font-size:.46rem;color:#cbd5e1;opacity:.7;}
  .push{width:92%;margin:auto;background:rgba(248,250,252,.97);border-radius:9px;padding:6px;text-align:left;box-shadow:0 4px 10px rgba(0,0,0,.4);opacity:0;}
  .push.show{animation:pushdown .55s cubic-bezier(.2,.85,.25,1) forwards;}
  @keyframes pushdown{from{transform:translateY(-120%);opacity:0}to{transform:translateY(0);opacity:1}}
  .push .ph{display:flex;align-items:center;gap:4px;margin-bottom:3px;} .push .pic{width:13px;height:13px;border-radius:3px;background:linear-gradient(135deg,#e11d48,#9333ea);}
  .push .pname{font-size:.5rem;font-weight:800;color:#475569;} .push .pt{font-size:.56rem;font-weight:800;color:#0f172a;line-height:1.2;} .push .pb{font-size:.5rem;color:#475569;line-height:1.25;margin-top:2px;}
  .ai-bubble{position:absolute;left:10px;bottom:120px;max-width:172px;background:#fff;border-radius:12px 12px 12px 3px;padding:.4rem .55rem;font-size:.62rem;font-weight:700;color:#0f172a;box-shadow:0 4px 10px rgba(0,0,0,.25);opacity:0;z-index:6;}
  .ai-bubble.show{animation:sigin .4s ease forwards;} .ai-bubble .who{display:block;font-size:.52rem;color:var(--pp);font-weight:800;margin-bottom:1px;}

  .hub{flex:none;height:124px;background:#0c1224;border-top:1px solid #20283f;display:flex;align-items:center;gap:14px;padding:8px 16px;}
  .hub .db{flex:none;width:116px;text-align:center;color:#c4b5fd;} .hub .db .ic{font-size:24px;} .hub .db .nm{font-size:.6rem;font-weight:800;margin-top:2px;} .hub .db .pulse{font-size:.52rem;color:#86efac;margin-top:2px;}
  .chans{flex:1;display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
  .chan{background:#131c33;border:1px solid #20304f;border-radius:10px;padding:7px 8px;opacity:.25;transform:translateY(6px);transition:all .35s;}
  .chan.on{opacity:1;transform:none;border-color:var(--pp);box-shadow:0 0 0 2px rgba(124,58,237,.25);}
  .chan .ct{font-size:.62rem;font-weight:800;color:#e9d5ff;} .chan .cb{font-size:.54rem;color:#9fb0c6;line-height:1.25;margin-top:3px;}

  .foot{flex:none;min-height:34px;display:flex;align-items:center;justify-content:center;text-align:center;padding:5px 12px;font-size:.78rem;font-weight:800;color:#fff;background:rgba(124,58,237,.96);} .foot b{color:#fde68a;}

  @keyframes fade{to{opacity:1;}} @keyframes gpulse{0%,100%{box-shadow:0 0 0 0 rgba(74,222,128,.6)}60%{box-shadow:0 0 0 5px rgba(74,222,128,0)}}
  .replay{margin-top:12px;font-size:.85rem;font-weight:700;color:var(--pp);background:#f5f3ff;border:1px solid #ddd6fe;border-radius:8px;padding:.45rem .9rem;cursor:pointer;}
  .note{margin-top:8px;font-size:.74rem;color:#94a3b8;}
</style>
</head>
<body>
  <h1 id="h1">🎬 초개인화 선제 대응 시나리오</h1>
  <p class="sub" id="sub"></p>
  <div class="tabs" id="tabs"></div>

  <div id="stage" class="stage">
    <div class="badge"><span class="dot"></span> <span id="badge"></span></div>
    <div class="tl" id="tl"><div class="clock" id="clock">+0s</div></div>
    <div class="main">
      <div class="col engine">
        <span class="coltag" id="engTag"></span>
        <div class="radar" id="radar"><span class="ring"></span><span class="ring"></span><span class="ring"></span><span class="ico" id="vizIco"></span><div class="rcount" id="rcount">👁 0건</div></div>
        <div class="profile">📇 과거 특성(프로필·계약·이용 이력) + 실시간 행동 관측</div>
        <div class="sigs" id="sigs"></div>
        <div class="gauge-wrap">
          <div class="gauge-lab"><span id="gaugeLab"></span><span id="gval">0%</span></div>
          <div class="gauge" id="gauge"><div class="fill" id="fill"></div><div class="thr"></div></div>
          <div class="intent-fixed" id="intent"></div>
        </div>
      </div>
      <div class="col cust">
        <span class="coltag" id="custTag"></span>
        <div class="home" id="home">
          <div class="c-floor"></div>
          <div class="zbg-left"></div>
          <div class="split-div"></div>
          <div class="splitzone" id="splitzone"></div>
          <span class="prop" id="prop"></span>
          <span class="loc-tag" id="locTag"></span>
          <span class="qmark" id="qmark">❓</span>
          <div class="people" id="people"></div>
          <div class="phone"><div class="pscreen">
            <div class="ptime">08:21</div><div class="pdate" id="pdate"></div>
            <div class="push" id="push"><div class="ph"><span class="pic"></span><span class="pname" id="pname"></span></div><div class="pt" id="ptitle"></div><div class="pb" id="pbody"></div></div>
          </div></div>
          <div class="ai-bubble" id="ai"><span class="who">🤖 AI Agent</span><span id="aitext"></span></div>
        </div>
      </div>
    </div>
    <div class="hub">
      <div class="db"><div class="ic">🗄️</div><div class="nm">고객 Context 자산 DB</div><div class="pulse">● 동기화</div></div>
      <div class="chans" id="chans"></div>
    </div>
    <div class="foot"><span id="foot"></span></div>
  </div>
  <div style="margin-top:12px;display:flex;gap:8px;justify-content:center;">
    <button onclick="parent.postMessage('story-start-demo','*')" style="font-size:.92rem;font-weight:800;color:#fff;background:#7c3aed;border:none;border-radius:9px;padding:.55rem 1.1rem;cursor:pointer;">▶ 시나리오 체험형 시연 시작</button>
    <button onclick="parent.postMessage('story-close','*')" style="font-size:.92rem;font-weight:700;color:#334155;background:#e2e8f0;border:none;border-radius:9px;padding:.55rem 1.1rem;cursor:pointer;">✕ 닫기</button>
  </div>
  <p class="note">※ A(인터넷 장애 선제 대응)는 지도 히트맵 등 특화 연출이 있어 <b>story-cs-outage.html</b>에서 별도 제공됩니다.</p>

  <script>
    const S={
      B:{dom:'CS',title:'말하기 전에 해결하는 요금 불만',sub:'고객이 불만을 말하기 전에 — <b>조회·탐색 행동으로 요금 부담을 먼저 파악</b>해 맞춤 절감안을 선제 제공합니다.',
        badge:'KT Context Engine · 요금 불만 선제 해결',tone:'risk',ico:'💳',
        tl:['요금 조회','행동 누적','요금 부담 추론','선제 제안','고객 문의 전 ✓'],
        engTag:'⚙️ KT 엔진 — 행동 기반 요금 부담 추론',
        sigs:[['💳 요금 조회 반복','×3'],['⚠️ 위약금 조회','감지'],['🔄 요금제 변경 페이지','체류 2분'],['🎁 혜택 페이지 반복','관심↑']],
        gaugeLab:'⟳ 추론 Intent: 요금 불만 · 절감 니즈',gauge:88,intent:'⚡ Intent 확정 — 요금 부담 · 맞춤 절감 니즈 高',
        custTag:'🙍 고객 — 아직 불만을 말한 적 없음',prop:'📄',loc:'자택 · 요금 확인 중',pdate:'화요일 · 자택',
        push:['MY KT','맞춤 요금제 도착','이용 패턴 기준 월 2만원 절감 가능'],
        ai:'요금 부담이 커진 패턴이 보여요. 월 2만원 절감 요금제를 추천드릴까요?',
        chans:[['📱 앱 푸시','더 적합한 요금제 선제 안내'],['🤖 AI Agent','절감 요금제 즉시 제안'],['🎧 상담사 콘솔','“요금 부담 가능성 높음” 표출'],['🏬 매장','맞춤 요금제 비교 제공']],
        foot:'고객이 불만을 말하기 전에 — <b>행동으로 요금 부담을 먼저 파악해 선제 해결</b>합니다.'},

      C:{dom:'CS',title:'우리 아이 AI 보호자',sub:'단순 위치 공유가 아니라 — <b>패턴을 학습해 이상을 먼저 감지</b>합니다.',
        badge:'KT Context Engine · 가족 안심 선제 케어',tone:'risk',ico:'🗺️',
        tl:['패턴 학습','경로 이탈 감지','이상 추론','보호자 선제 알림','보호자 확인 전 ✓'],
        engTag:'⚙️ KT 엔진 — 위치·패턴 이상 감지',
        sigs:[['📍 실시간 위치 갱신','추적'],['🧭 평소 생활 반경 이탈','이탈'],['🕐 비정상 체류','감지'],['📊 30일 패턴 대비','이상치']],
        gaugeLab:'⟳ 추론 Intent: 이상 상황 가능성',gauge:84,intent:'⚡ Intent 확정 — 안전 확인 · 가족 안심 니즈',
        custTag:'👪 보호자 — 아직 모름',prop:'🏠',loc:'보호자 · 자택',pdate:'평일 오후 · 자택',
        split:{left:{label:'🚶 자녀 · 외부(경로 이탈)',person:{child:1,hair:'#2a2018',cloth:'#d97706'}},right:{label:'🏠 보호자 · 자택',person:{hair:'#3b2f2a',cloth:'#6c7a95'}}},
        push:['MY KT','자녀 위치 안내','OO님 현재 위치가 평소 경로와 다릅니다'],
        ai:'현재 위치를 확인하고 연락을 시도해 보시겠어요?',
        chans:[['📱 앱 푸시','경로 이탈 선제 알림'],['🤖 AI Agent','위치 확인·연락 시도 제안'],['🎧 상담사 콘솔','위치 이력 즉시 확인'],['🏬 매장','가족 안심 서비스 안내']],
        foot:'단순 위치 공유가 아니라 — <b>패턴을 학습해 이상을 먼저 알아챕니다</b>.'},

      D:{dom:'결합',title:'고객보다 먼저 찾는 결합 기회',sub:'고객이 결합을 검색하기 전에 — <b>결합이 필요한 순간을 먼저 발견</b>합니다.',
        badge:'KT Context Engine · 결합 적기 선제 발견',tone:'opp',ico:'🏠',
        tl:['생활 패턴 분석','동거 신호 감지','결합 적기 추론','선제 제안','고객 검색 전 ✓'],
        engTag:'⚙️ KT 엔진 — 생활 패턴 분석',
        sigs:[['🏠 동일 장소 반복 체류','감지'],['📍 주거지 변화','포착'],['✉️ 주소 변경 행동','확인'],['👥 가족/관계 신호','일치']],
        gaugeLab:'⟳ 추론 Intent: 결합 니즈 가능성',gauge:86,intent:'⚡ Intent 확정 — Y끼리/가족 결합 · 신규 가구 형성',
        custTag:'🧑‍🤝‍🧑 고객 — 결합 검색한 적 없음',prop:'🏠',loc:'신규 거주지',pdate:'주말 · 새 집',
        push:['MY KT','결합 혜택 안내','함께 거주 중인 것으로 보여요 · 결합 시 연 48만원 절약'],
        ai:'두 회선을 결합해 드릴까요? 연 48만원 절약이 가능해요.',
        chans:[['📱 앱 푸시','결합 절감액 선제 안내'],['🤖 AI Agent','결합 즉시 신청 지원'],['🎧 상담사 콘솔','결합 가능 구조 안내'],['🏬 매장','맞춤 결합 시뮬레이션']],
        foot:'고객이 결합을 검색하기 전에 — <b>결합이 필요한 순간을 KT가 먼저 발견</b>합니다.'},

      E:{dom:'결합',title:'짐은 아직 안 왔는데, 인터넷은 도착',sub:'고객 행동이 아니라 — <b>삶의 변화(이사)를 이해하고 서비스가 먼저 움직임</b>.',
        badge:'KT Context Engine · 이사 선제 준비',tone:'opp',ico:'📦',
        tl:['생활 변화 감지','이사 신호 포착','이전 니즈 추론','선제 예약 제안','고객 신청 전 ✓'],
        engTag:'⚙️ KT 엔진 — 삶의 변화 감지',
        sigs:[['📍 신규 지역 장기 체류','감지'],['🔍 이사 관련 검색','증가'],['🏘 부동산 앱 사용','급증'],['✉️ 주소 변경 행동','확인']],
        gaugeLab:'⟳ 추론 Intent: 이사 가능성',gauge:90,intent:'⚡ Intent 확정 — 인터넷/IPTV 이전 · 신규 가입',
        custTag:'📦 고객 — 이사 준비 중',prop:'📦',loc:'새 거주지',pdate:'이사 D-3 · 새 집',
        push:['MY KT','인터넷 이전 설치 안내','새 거주지 인터넷·IPTV 이전을 예약하시겠어요?'],
        ai:'고객님 일정에 맞춰 이전 설치를 예약해 드릴게요.',
        chans:[['📱 앱 푸시','이전 설치 예약 제안'],['🤖 AI Agent','일정 맞춤 자동 예약'],['🎧 상담사 콘솔','이전 일정 조율'],['🏬 매장','신규 주소 기반 상품 추천']],
        foot:'고객 행동이 아니라 <b>삶의 변화(이사)를 이해</b>하고 — 서비스가 먼저 움직입니다.'},

      F:{dom:'결합',title:'결합 이탈 신호, 깨지기 전에 포착',sub:'이미 떠난 고객을 잡는 게 아니라 — <b>결합이 깨질 미래를 예측해 먼저 막습니다</b>.',
        badge:'KT Context Engine · 결합 이탈 예측 방지',tone:'risk',ico:'👨‍👩‍👧',
        tl:['결합 구조 모니터링','번호이동 신호 감지','이탈 위험 추론','유지 방안 선제 제안','이탈 전 ✓'],
        engTag:'⚙️ KT 엔진 — 결합 이탈 예측',
        sigs:[['🔁 번호이동 관련 행동','감지'],['📱 단말 비교','반복'],['⚠️ 위약금 조회','확인'],['🎁 타사 혜택 조회','관심↑']],
        gaugeLab:'⟳ 추론 Intent: 가족결합 이탈 위험',gauge:82,intent:'⚡ Intent 확정 — 번호이동 검토 · 가족결합 붕괴 위험',
        custTag:'👨‍👩‍👧 가족 — 아직 이탈 전',prop:'👨‍👩‍👧',loc:'가족 · 자택',pdate:'평일 저녁 · 자택',
        push:['MY KT','가족결합 혜택 유지 안내','회선 변경 시 결합 혜택이 감소할 수 있어요'],
        ai:'현재 가족결합 유지 시 연 60만원 혜택을 받고 있어요. 유지 방안을 안내할까요?',
        chans:[['📱 앱 푸시','결합 혜택 감소 경고'],['🤖 AI Agent','결합 유지 방안 제안'],['🎧 상담사 콘솔','결합 붕괴 위험도 제공'],['🏬 매장','대체 결합 구조 추천']],
        foot:'이미 떠난 고객을 잡는 게 아니라 — <b>결합이 깨질 미래를 예측해 먼저 막습니다</b>.'},
    };
    const PEOPLE={
      B:[{}],
      C:[{hair:'#3b2f2a',cloth:'#6c7a95'},{child:1,hair:'#2a2018',cloth:'#d97706'}],
      D:[{hair:'#3b2f2a',cloth:'#5b9bd5'},{hair:'#241a12',cloth:'#b3424f'}],
      E:[{hair:'#3b2f2a',cloth:'#6c7a95'}],
      F:[{hair:'#3b2f2a',cloth:'#6c7a95'},{hair:'#4a3528',cloth:'#5b9bd5'},{child:1,hair:'#2a2018',cloth:'#d97706'}],
    };
    function person(p){p=p||{};const hair=p.hair||'#3b2f2a',cloth=p.cloth||'#6c7a95';
      return `<div class="pp${p.child?' child':''}"><svg viewBox="0 0 120 120" width="84">`
        +`<ellipse cx="60" cy="50" rx="22" ry="23" fill="#f2c6a0"/><path d="M38 48 Q37 24 60 24 Q83 24 82 48 Q76 38 60 38 Q44 38 38 48 Z" fill="${hair}"/>`
        +`<g class="face-q"><path d="M49 49 Q54 46 59 49" stroke="#3a2a1e" stroke-width="2.3" fill="none" stroke-linecap="round"/><path d="M61 49 Q66 46 71 49" stroke="#3a2a1e" stroke-width="2.3" fill="none" stroke-linecap="round"/><path d="M53 64 Q60 60 67 64" stroke="#7a5b48" stroke-width="2.2" fill="none" stroke-linecap="round"/></g>`
        +`<g class="face-relief"><path d="M49 50 Q54 53 59 50" stroke="#3a2a1e" stroke-width="2.3" fill="none" stroke-linecap="round"/><path d="M61 50 Q66 53 71 50" stroke="#3a2a1e" stroke-width="2.3" fill="none" stroke-linecap="round"/><path d="M52 61 Q60 69 68 61" stroke="#7a5b48" stroke-width="2.4" fill="none" stroke-linecap="round"/></g>`
        +`<path d="M28 120 Q26 92 60 92 Q94 92 92 120 Z" fill="${cloth}"/></svg></div>`;}
    const $=s=>document.querySelector(s);
    let cur='B',timers=[],intervals=[];
    const at=(t,fn)=>timers.push(setTimeout(fn,t));
    function clearAll(){timers.forEach(clearTimeout);timers=[];intervals.forEach(clearInterval);intervals=[];}

    // 탭
    const tabs=$('#tabs');
    Object.keys(S).forEach(k=>{const b=document.createElement('button');b.innerHTML=`${k} <span class="dom">${S[k].dom}</span>`;b.onclick=()=>{cur=k;location.hash=k;render();};b.dataset.k=k;tabs.appendChild(b);});

    function render(){
      const c=S[cur];
      document.querySelectorAll('.tabs button').forEach(b=>b.classList.toggle('on',b.dataset.k===cur));
      $('#h1').innerHTML='🎬 '+c.title; $('#sub').innerHTML=c.sub; $('#badge').textContent=c.badge;
      $('#engTag').textContent=c.engTag; $('#custTag').textContent=c.custTag; $('#vizIco').textContent=c.ico;
      $('#prop').textContent=c.prop; $('#locTag').textContent='📍 '+c.loc; $('#pdate').textContent=c.pdate;
      $('#gaugeLab').textContent=c.gaugeLab; $('#pname').textContent=c.push[0]; $('#ptitle').textContent=c.push[1]; $('#pbody').textContent=c.push[2];
      $('#aitext').textContent=c.ai; $('#foot').innerHTML=c.foot;
      $('#gauge').className='gauge'+(c.tone==='risk'?' risk':''); $('#intent').className='intent-fixed'+(c.tone==='risk'?' risk':'');
      $('#intent').textContent=c.intent;
      // timeline
      const tl=$('#tl'); tl.querySelectorAll('.node').forEach(n=>n.remove());
      c.tl.forEach((t,i)=>{const n=document.createElement('div');n.className='node';n.dataset.n=i;n.innerHTML=`<span class="pt"></span>${t}`;tl.appendChild(n);});
      // signals
      const sg=$('#sigs'); sg.innerHTML=c.sigs.map(s=>`<div class="sig">${s[0]} <span class="v">${s[1]}</span></div>`).join('');
      // channels
      $('#chans').innerHTML=c.chans.map(ch=>`<div class="chan"><div class="ct">${ch[0]}</div><div class="cb">${ch[1]}</div></div>`).join('');
      // people (가족/커플은 2명 이상 · C는 분리 공간)
      const home=$('#home');
      if(c.split){
        home.classList.add('split'); $('#people').innerHTML='';
        $('#splitzone').innerHTML=
          `<div class="zone zleft"><div class="zlabel">${c.split.left.label}</div>${person(c.split.left.person)}</div>`+
          `<div class="zone zright"><div class="zlabel">${c.split.right.label}</div>${person(c.split.right.person)}</div>`;
      }else{
        home.classList.remove('split'); $('#splitzone').innerHTML='';
        $('#people').innerHTML=(PEOPLE[cur]||[{}]).map(person).join('');
      }
      play();
    }

    function gaugeTo(target,dur){
      const fill=$('#fill'),val=$('#gval');let v=0;const n=Math.max(1,Math.round(dur/40)),inc=target/n;
      const id=setInterval(()=>{v+=inc;if(v>=target){v=target;clearInterval(id);}fill.style.width=v+'%';val.textContent=Math.round(v)+'%';},40);
      intervals.push(id);
    }
    function clockRun(){let t=0;const c=$('#clock');const id=setInterval(()=>{t+=1;c.textContent='+'+t+'s';if(t>=24)clearInterval(id);},90);intervals.push(id);}
    const nd=(i,s)=>{const e=document.querySelector(`.tl .node[data-n="${i}"]`);if(e)e.classList.add(s);};

    function play(){
      clearAll();
      $('#radar').classList.remove('scan');
      document.querySelectorAll('.sig').forEach(s=>s.classList.remove('show'));
      document.querySelectorAll('.tl .node').forEach(n=>n.classList.remove('on','done'));
      document.querySelectorAll('.chan').forEach(c=>c.classList.remove('on'));
      $('#home').classList.remove('resolved'); $('#qmark').classList.remove('show'); $('#push').classList.remove('show'); $('#ai').classList.remove('show'); $('#intent').classList.remove('show');
      $('#fill').style.width='0%'; $('#gval').textContent='0%'; $('#clock').textContent='+0s'; $('#rcount').textContent='👁 0건';
      const sigs=document.querySelectorAll('.sig');
      // 시퀀스
      nd(0,'on'); clockRun(); $('#radar').classList.add('scan');
      sigs.forEach((s,i)=>at(700+i*430,()=>{s.classList.add('show');$('#rcount').textContent='👁 행동 '+(i+1)+'건 누적';}));
      at(700,()=>{nd(0,'done');nd(1,'on');});
      at(800,()=>gaugeTo(S[cur].gauge,2200));
      at(2500,()=>{nd(1,'done');nd(2,'on');});
      at(3100,()=>{nd(2,'done');$('#intent').classList.add('show');});
      at(3500,()=>nd(3,'on'));
      document.querySelectorAll('.chan').forEach((c,i)=>at(3700+i*330,()=>c.classList.add('on')));
      at(3900,()=>$('#qmark').classList.add('show'));
      at(5100,()=>{nd(3,'done');nd(4,'on');$('#push').classList.add('show');});
      at(5900,()=>$('#ai').classList.add('show'));
      at(6500,()=>{$('#home').classList.add('resolved');nd(4,'done');});
    }
    if(new URLSearchParams(location.search).has('embed'))document.documentElement.classList.add('embed');
    if(S[location.hash.replace('#','')])cur=location.hash.replace('#','');
    render();
  </script>
</body>
